<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOP BLASTER • Green Candle Defense</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Creepster&family=VT323&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #00ff9d;
      font-family: 'VT323', monospace;
    }

    .overlay {
      background: rgba(8, 8, 12, 0.94);
      min-height: 100vh;
    }

    /* Main Hero Image Section */
    .main-hero {
      height: 85vh;
      background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.85)), 
                  url('https://i.imgur.com/xonhOxt.jpeg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      border-bottom: 8px solid #00ff9d;
    }

    .main-hero-content {
      max-width: 1100px;
      padding: 20px;
      z-index: 2;
    }

    .main-hero h1 {
      font-family: 'Creepster', cursive;
      font-size: 5.4rem;
      color: #00ff9d;
      text-shadow: 
        0 0 15px #00ff9d,
        0 0 25px #00ff9d,
        0 0 40px #00ff9d,
        3px 3px 0 #000,
        -3px -3px 0 #000;
      margin-bottom: 20px;
      line-height: 1.05;
    }

    .main-hero p {
      font-size: 2.1rem;
      color: #aaffcc;
      text-shadow: 0 0 12px #000;
      margin-bottom: 30px;
    }

    .header {
      background: linear-gradient(to bottom, rgba(0,0,0,0.95), rgba(20,0,0,0.9));
      padding: 25px 0;
      text-align: center;
      position: relative;
      z-index: 10;
      border-bottom: 4px solid #00ff9d;
    }

    .title {
      font-family: 'Creepster', cursive;
      font-size: 3.8rem;
      color: #00ff9d;
      text-shadow: 
        0 0 10px #00ff9d,
        0 0 20px #00ff9d;
      letter-spacing: 6px;
    }

    .subtitle {
      font-family: 'Press Start 2P', cursive;
      font-size: 1.55rem;
      color: #ff6688;
      text-shadow: 0 0 10px rgba(255, 50, 100, 0.6);
      margin-top: 8px;
    }

    .gallery-section {
      padding: 90px 20px;
      background: rgba(8, 8, 12, 0.96);
      text-align: center;
      position: relative;
      z-index: 5;
    }

    .gallery-section h2 {
      font-family: 'Creepster', cursive;
      font-size: 3rem;
      margin-bottom: 50px;
      color: #00ff9d;
      text-shadow: 0 0 15px #00ff9d;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 15px;
    }

    .gallery-img {
      width: 100%;
      border: 6px solid #00ff9d;
      box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
      transition: all 0.3s;
    }

    .gallery-img:hover {
      transform: scale(1.04);
      box-shadow: 0 0 45px rgba(0, 255, 157, 0.7);
    }

    .status-bar {
      background: rgba(15, 0, 5, 0.95);
      padding: 48px 20px;
      font-size: 2.35rem;
      text-align: center;
      border-top: 5px solid #00ff9d;
      border-bottom: 5px solid #00ff9d;
      position: relative;
      z-index: 5;
    }

    .neon {
      animation: neon 2s infinite alternate;
    }

    @keyframes neon {
      from { text-shadow: 0 0 12px #00ff9d; }
      to { text-shadow: 0 0 22px #00ff9d, 0 0 35px rgba(255, 50, 80, 0.4); }
    }

    .footer {
      padding: 55px 20px;
      text-align: center;
      color: #777;
      font-size: 1.35rem;
      position: relative;
      z-index: 5;
    }
  </style>
</head>
<body>

  <div class="overlay">

    <!-- New Main Hero Image -->
    <div class="main-hero">
      <div class="main-hero-content">
        <h1>TOP BLASTER</h1>
        <p>Every buy detected.<br>Every jeet denied.<br>Every green candle secured.</p>
      </div>
    </div>

    <!-- Header -->
    <div class="header">
      <h1 class="title">TOP BLASTER</h1>
      <p class="subtitle">GREEN CANDLE DEFENSE PROTOCOL</p>
    </div>

    <!-- Gallery Section -->
    <div id="gallery" class="gallery-section">
      <h2>TOP BLASTER ART GALLERY</h2>
      <div class="gallery-grid">
        <img src="https://i.imgur.com/iujisDQ.jpeg" alt="Art 1" class="gallery-img">
        <img src="https://i.imgur.com/IWYzo72.jpeg" alt="Art 2" class="gallery-img">
        <img src="https://i.imgur.com/nKX30q2.jpeg" alt="Art 3" class="gallery-img">
        <img src="https://i.imgur.com/ALYAhF9.jpeg" alt="Art 4" class="gallery-img">
        <img src="https://i.imgur.com/Io32R4I.jpeg" alt="Art 5" class="gallery-img">
        <img src="https://i.imgur.com/Zm4Xu71.jpeg" alt="Art 6" class="gallery-img">
        <img src="https://i.imgur.com/9ZVEQ4V.jpeg" alt="Art 7" class="gallery-img">
        <img src="https://i.imgur.com/ENFM8bs.jpeg" alt="Art 8" class="gallery-img">
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <p class="neon">BUY DETECTED, TOPBLAST EXECUTED</p>
    </div>

    <div class="footer">
      <p>TOPBLASTER</p>
    </div>

  </div>

</body>
</html>
