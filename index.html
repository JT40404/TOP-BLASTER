<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOP BLASTER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Creepster&family=VT323&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: url('https://i.imgur.com/Zm4Xu71.jpeg') center/cover fixed;
      color: #00ff9d;
      font-family: 'VT323', monospace;
      min-height: 100vh;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.85);
      min-height: 100vh;
    }

    /* Main Image - Front and Center at the Top */
    .main-image {
      width: 100%;
      height: 75vh;
      background: url('https://i.imgur.com/xonhOxt.jpeg') center/cover no-repeat;
      position: relative;
    }

    .main-image-content {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      width: 90%;
    }

    .main-image h1 {
      font-family: 'Creepster', cursive;
      font-size: 5.5rem;
      color: #00ff9d;
      text-shadow: 5px 5px 0 #000, -5px -5px 0 #000;
      margin-bottom: 15px;
    }

    .main-image p {
      font-size: 2rem;
      color: #bbffdd;
      text-shadow: 3px 3px 0 #000;
    }

    .header {
      padding: 20px 0;
      text-align: center;
      background: rgba(0,0,0,0.8);
    }

    .title {
      font-family: 'Creepster', cursive;
      font-size: 3.8rem;
      color: #00ff9d;
    }

    .gallery-section {
      padding: 60px 20px;
      background: rgba(8, 8, 12, 0.95);
      text-align: center;
    }

    .gallery-section h2 {
      font-family: 'Creepster', cursive;
      font-size: 2.8rem;
      margin-bottom: 40px;
      color: #00ff9d;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .gallery-img {
      width: 100%;
      border: 5px solid #00ff9d;
    }

    .status-bar {
      background: rgba(20, 0, 0, 0.9);
      padding: 40px 20px;
      font-size: 2.2rem;
      text-align: center;
      border-top: 5px solid #00ff9d;
      border-bottom: 5px solid #00ff9d;
    }

    .footer {
      padding: 40px 20px;
      text-align: center;
      color: #666;
      font-size: 1.3rem;
    }
  </style>
</head>
<body>

  <div class="overlay">

    <!-- Main Image at the Top -->
    <div class="main-image">
      <div class="main-image-content">
        <h1>TOP BLASTER</h1>
        <p>Every buy detected.<br>Every jeet denied.<br>Every green candle secured.</p>
      </div>
    </div>

    <!-- Small Header -->
    <div class="header">
      <h1 class="title">TOP BLASTER</h1>
    </div>

    <!-- Gallery -->
    <div class="gallery-section">
      <h2>ART GALLERY</h2>
      <div class="gallery-grid">
        <img src="https://i.imgur.com/iujisDQ.jpeg" alt="1" class="gallery-img">
        <img src="https://i.imgur.com/IWYzo72.jpeg" alt="2" class="gallery-img">
        <img src="https://i.imgur.com/nKX30q2.jpeg" alt="3" class="gallery-img">
        <img src="https://i.imgur.com/ALYAhF9.jpeg" alt="4" class="gallery-img">
        <img src="https://i.imgur.com/Io32R4I.jpeg" alt="5" class="gallery-img">
        <img src="https://i.imgur.com/Zm4Xu71.jpeg" alt="6" class="gallery-img">
        <img src="https://i.imgur.com/9ZVEQ4V.jpeg" alt="7" class="gallery-img">
        <img src="https://i.imgur.com/ENFM8bs.jpeg" alt="8" class="gallery-img">
      </div>
    </div>

    <!-- Status -->
    <div class="status-bar">
      BUY DETECTED, TOPBLAST EXECUTED
    </div>

    <div class="footer">
      <p>TOPBLASTER</p>
    </div>

  </div>

</body>
</html>
