<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOP BLASTER • Green Candle Defense</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Creepster&family=VT323&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #ff3366;
      font-family: 'VT323', monospace;
    }

    .overlay {
      background: rgba(10, 5, 8, 0.88);
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(to bottom, rgba(0,0,0,0.98), rgba(30,0,0,0.95));
      border-bottom: 6px solid #cc1122;
      padding: 35px 0 28px;
      text-align: center;
      position: relative;
      z-index: 10;
    }

    .title {
      font-family: 'Creepster', cursive;
      font-size: 4.5rem;
      color: #ff3366;
      text-shadow: 
        0 0 15px #cc1122,
        0 0 30px #cc1122,
        4px 4px 0 #000,
        -4px -4px 0 #000;
      letter-spacing: 8px;
      line-height: 1.05;
    }

    .subtitle {
      font-family: 'Press Start 2P', cursive;
      font-size: 1.65rem;
      color: #ff6688;
      text-shadow: 0 0 12px #cc1122;
      margin-top: 12px;
      letter-spacing: 4px;
    }

    .hero {
      height: 82vh;
      background: linear-gradient(rgba(0,0,0,0.75), rgba(15,0,0,0.9)), 
                  url('https://i.imgur.com/xonhOxt.jpeg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 5;
      border-bottom: 8px solid #cc1122;
    }

    .hero-content {
      max-width: 1100px;
      padding: 20px;
    }

    .hero h1 {
      font-family: 'Creepster', cursive;
      font-size: 5.5rem;
      margin-bottom: 25px;
      color: #ff3366;
      text-shadow: 
        0 0 25px #cc1122,
        0 0 45px #cc1122,
        8px 8px 0 #000;
      line-height: 1;
    }

    .hero p {
      font-size: 2.15rem;
      margin-bottom: 40px;
      text-shadow: 0 0 15px #000;
      color: #ff99aa;
    }

    .gallery-section {
      padding: 90px 20px;
      background: rgba(10, 5, 8, 0.96);
      text-align: center;
      position: relative;
      z-index: 5;
    }

    .gallery-section h2 {
      font-family: 'Creepster', cursive;
      font-size: 3.2rem;
      margin-bottom: 50px;
      color: #ff3366;
      text-shadow: 0 0 20px #cc1122;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 15px;
    }

    .gallery-img {
      width: 100%;
      border: 7px solid #cc1122;
      box-shadow: 0 0 40px rgba(204, 17, 34, 0.6);
      transition: all 0.3s;
    }

    .gallery-img:hover {
      transform: scale(1.04);
      box-shadow: 0 0 55px rgba(204, 17, 34, 0.8);
    }

    .status-bar {
      background: rgba(25, 0, 5, 0.95);
      padding: 50px 20px;
      font-size: 2.4rem;
      text-align: center;
      border-top: 6px solid #cc1122;
      border-bottom: 6px solid #cc1122;
      position: relative;
      z-index: 5;
    }

    .neon {
      animation: neon 1.6s infinite alternate;
    }

    @keyframes neon {
      from { text-shadow: 0 0 15px #ff3366; }
      to { text-shadow: 0 0 30px #ff3366, 0 0 50px #cc1122; }
    }

    .footer {
      padding: 60px 20px;
      text-align: center;
      color: #777;
      font-size: 1.4rem;
      position: relative;
      z-index: 5;
    }
  </style>
</head>
<body>

  <div class="overlay">

    <div class="header">
      <h1 class="title">TOP BLASTER</h1>
      <p class="subtitle">GREEN CANDLE DEFENSE PROTOCOL</p>
    </div>

    <!-- Hero Section with your new main image -->
    <div class="hero">
      <div class="hero-content">
        <h1>TOP BLASTER IS ACTIVE</h1>
        <p>Every buy detected.<br>Every jeet denied.<br>Every green candle secured.</p>
      </div>
    </div>

    <!-- Gallery Section -->
    <div id="gallery" class="gallery-section">
      <h2>TOP BLASTER ART GALLERY</h2>
      <div class="gallery-grid">
        <img src="https://i.imgur.com/iujisDQ.jpeg" alt="Art 1" class="gallery-img">
        <img src="https://i.imgur.com/IWYzo72.jpeg" alt="Art 2" class="gallery-img">
        <img src="https://i.imgur.com/nKX30q2.jpeg" alt="Art 3" class="gallery-img">
        <img src="https://i.imgur.com/ALYAhF9.jpeg" alt="Art 4" class="gallery-img">
        <img src="https://i.imgur.com/Io32R4I.jpeg" alt="Art 5" class="gallery-img">
        <img src="https://i.imgur.com/Zm4Xu71.jpeg" alt="Art 6" class="gallery-img">
        <img src="https://i.imgur.com/9ZVEQ4V.jpeg" alt="Art 7" class="gallery-img">
        <img src="https://i.imgur.com/ENFM8bs.jpeg" alt="Art 8" class="gallery-img">
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <p class="neon">BUY DETECTED, TOPBLAST EXECUTED</p>
    </div>

    <div class="footer">
      <p>TOPBLASTER</p>
    </div>

  </div>

</body>
</html>
