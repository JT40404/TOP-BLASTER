<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOP BLASTER • Green Candle Defense</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Creepster&family=VT323&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      margin: 0;
      background: #0a0a0a;
      color: #00ff9d;
      font-family: 'VT323', monospace;
      background-image: url('https://i.imgur.com/Zm4Xu71.jpeg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .overlay {
      background: rgba(5, 5, 10, 0.92);
      min-height: 100vh;
    }

    /* Main Hero Image Section */
    .main-hero {
      height: 82vh;
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.88)), 
                  url('https://i.imgur.com/xonhOxt.jpeg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .main-hero-content {
      max-width: 1000px;
      padding: 20px;
      z-index: 2;
    }

    .main-hero h1 {
      font-family: 'Creepster', cursive;
      font-size: 5.2rem;
      color: #00ff9d;
      text-shadow: 5px 5px 0 #000, -5px -5px 0 #000;
      margin-bottom: 20px;
    }

    .main-hero p {
      font-size: 2.1rem;
      color: #bbffdd;
      text-shadow: 3px 3px 0 #000;
    }

    .header {
      background: rgba(0,0,0,0.85);
      padding: 20px 0;
      text-align: center;
      border-bottom: 4px solid #00ff41;
    }

    .title {
      font-family: 'Creepster', cursive;
      font-size: 3.8rem;
      color: #00ff9d;
      text-shadow: 4px 4px 0 #000;
    }

    .subtitle {
      font-family: 'Press Start 2P', cursive;
      font-size: 1.55rem;
      color: #ff6688;
      margin-top: 8px;
    }

    .gallery-section {
      padding: 80px 20px;
      background: rgba(8, 8, 12, 0.96);
      text-align: center;
    }

    .gallery-section h2 {
      font-family: 'Creepster', cursive;
      font-size: 3rem;
      margin-bottom: 45px;
      color: #00ff9d;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 15px;
    }

    .gallery-img {
      width: 100%;
      border: 6px solid #00ff9d;
      box-shadow: 0 0 25px rgba(0, 255, 157, 0.4);
    }

    .status-bar {
      background: rgba(15, 0, 5, 0.95);
      padding: 45px 20px;
      font-size: 2.3rem;
      text-align: center;
      border-top: 5px solid #00ff9d;
      border-bottom: 5px solid #00ff9d;
    }

    .footer {
      padding: 50px 20px;
      text-align: center;
      color: #777;
      font-size: 1.35rem;
    }
  </style>
</head>
<body>

  <div class="overlay">

    <!-- Main Hero Image (your requested image) -->
    <div class="main-hero">
      <div class="main-hero-content">
        <h1>TOP BLASTER</h1>
        <p>Every buy detected.<br>Every jeet denied.<br>Every green candle secured.</p>
      </div>
    </div>

    <!-- Small Header -->
    <div class="header">
      <h1 class="title">TOP BLASTER</h1>
      <p class="subtitle">GREEN CANDLE DEFENSE PROTOCOL</p>
    </div>

    <!-- Gallery -->
    <div id="gallery" class="gallery-section">
      <h2>TOP BLASTER ART GALLERY</h2>
      <div class="gallery-grid">
        <img src="https://i.imgur.com/iujisDQ.jpeg" alt="Art 1" class="gallery-img">
        <img src="https://i.imgur.com/IWYzo72.jpeg" alt="Art 2" class="gallery-img">
        <img src="https://i.imgur.com/nKX30q2.jpeg" alt="Art 3" class="gallery-img">
        <img src="https://i.imgur.com/ALYAhF9.jpeg" alt="Art 4" class="gallery-img">
        <img src="https://i.imgur.com/Io32R4I.jpeg" alt="Art 5" class="gallery-img">
        <img src="https://i.imgur.com/Zm4Xu71.jpeg" alt="Art 6" class="gallery-img">
        <img src="https://i.imgur.com/9ZVEQ4V.jpeg" alt="Art 7" class="gallery-img">
        <img src="https://i.imgur.com/ENFM8bs.jpeg" alt="Art 8" class="gallery-img">
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <p>BUY DETECTED, TOPBLAST EXECUTED</p>
    </div>

    <div class="footer">
      <p>TOPBLASTER</p>
    </div>

  </div>

</body>
</html>
